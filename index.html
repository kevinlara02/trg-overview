window.topItems     = EMBEDDED_DATA.topItems     || {};
window.categoryData = EMBEDDED_DATA.categoryData || {};
window.detailData   = EMBEDDED_DATA.detailData   || {};
window.orderStats   = EMBEDDED_DATA.orderStats   || {};

// --- App State ---
const AppState = {
  restaurants: EMBEDDED_DATA.restaurants,
  ingresosData: EMBEDDED_DATA.ingresosData,
  expenses: JSON.parse(localStorage.getItem('trgExpenses') || JSON.stringify(EMBEDDED_DATA.expenses || [])),
  cloverData: {},
  currentTab: 'dashboard'
};

// Initialize colorMap from EMBEDDED_DATA
window.colorMap = {};
EMBEDDED_DATA.restaurants.forEach(r => { window.colorMap[r.name] = r.color || '#888'; });
// Also rebuild when AppState is updated
if (AppState.restaurants.length > 0) {
  AppState.restaurants.forEach(r => { window.colorMap[r.name] = r.color || '#888'; });
}


// --- Helpers ---
const fmt  = v => '$' + Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = v => Number(v||0).toLocaleString('en-US');
const el   = id => document.getElementById(id);
const saveExpenses = () => localStorage.setItem('trgExpenses', JSON.stringify(AppState.expenses));

// --- API ---
const CLOVER_BASE = 'https://api.clover.com/v3/merchants';

// --- All Functions ---
window.allRestaurants = AppState.restaurants;
window.activeTab = window.activeTab || 'dashboard';
window.getDates = () => {
  const dates = [...new Set(AppState.ingresosData.map(d=>d.date))].sort();
  return dates;
};
window.fmt = (n) => '$' + (n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
window.getColor = (name) => window.colorMap[name] || '#888';
window.getTodayTotal = (name) => {
  const today = '2026-03-25';
  return AppState.ingresosData.filter(d=>d.restaurant===name && d.date===today).reduce((s,d)=>s+d.net,0);
};
window.getTotalByRestaurant = (name) => {
  return AppState.ingresosData.filter(d=>d.restaurant===name).reduce((s,d)=>s+d.net,0);
};
window.getGroupWeekTotal = () => AppState.ingresosData.reduce((s,d)=>s+d.net,0);
window.getGroupTodayTotal = () => {
  const today = '2026-03-25';
  return AppState.ingresosData.filter(d=>d.date===today).reduce((s,d)=>s+d.net,0);
};
window.getTotalExpenses = () => AppState.expenses.reduce((s,e)=>s+e.amount,0);
window.updateRestaurantSelectors = function() {};
window.syncAllData = async function() { for (const r of AppState.restaurants) { try { await fetchPaymentsForRestaurant(r.name, r.token, r.merchantId||r.id); } catch(e) { console.warn('Error syncing '+r.name, e); } } renderApp(); };
window.refreshRestaurant = async function(name) { const r = AppState.restaurants.find(x=>x.name===name); if (r) { await fetchPaymentsForRestaurant(r.name, r.token, r.merchantId||r.id); renderApp(); } };
window.addRestaurantFromSettings = function() { const n=document.getElementById('set-name')?.value; const t=document.getElementById('set-token')?.value; const m=document.getElementById('set-merchant')?.value; if(!n||!t||!m){alert('Fill all fields');return;} AppState.restaurants.push({name:n,token:t,merchantId:m,color:'#888'}); renderSettings(); };
window.getRestaurantNames = () => AppState.restaurants.map(r => r.name);
window.renderApp = function() {
  const names = window.allRestaurants ? window.allRestaurants.map(r=>r.name) : getRestaurantNames();
  const now = new Date().toLocaleTimeString('en-US');

  const app = document.getElementById('app');
  app.innerHTML = `
  <div class="header">
    <h1>TRG OVERVIEW</h1>
    <div class="header-right">
      <span>Last sync: ${now}</span>
      <span>|</span>
      <span>${names.length} restaurants connected</span>
      <button class="sync-btn" onclick="syncAllData()">🔄 Refresh Data</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab ${activeTab==='dashboard'?'active':''}" onclick="switchTab('dashboard')">📊 Dashboard</div>
    <div class="tab ${activeTab==='income'?'active':''}" onclick="switchTab('income')">💵 Clover Income</div>
    <div class="tab ${activeTab==='analytics'?'active':''}" onclick="switchTab('analytics')">🔬 Analytics</div>
    <div class="tab ${activeTab==='expenses'?'active':''}" onclick="switchTab('expenses')">📦 Expenses</div>
    <div class="tab ${activeTab==='comparison'?'active':''}" onclick="switchTab('comparison')">📈 Comparison</div>
    <div class="tab ${activeTab==='breakdown'?'active':''}" onclick="switchTab('breakdown')">🔍 Breakdown</div>
    <div class="tab ${activeTab==='settings'?'active':''}" onclick="switchTab('settings')">⚙️ Settings</div>
  </div>
  <div class="content" id="main-content"></div>`;

  renderTab();
};

    return `<div class="rest-card" style="border-top-color:${col}">
      <div class="rest-name">

      <div class="rest-total">${fmt(wk)}</div>
      <div class="rest-today">Today: ${fmt(td)}</div>
      <div class="rest-bar-bg"><div class="rest-bar-fill" style="width:${pct}%;background:${col}"></div></div>

    </div>`;
  }).join('');

  const dates = getDates();
  const dateLabels = dates.map(d => {
    const dt = new Date(d+'T12:00:00');

  });

  el.innerHTML = `
  <div class="kpi-grid">
    <div class="kpi-card" style="border-left-color:#3f3267">
      <div class="label">Weekly Net Sales</div>
      <div class="value">${fmt(weekTotal)}</div>
      <div class="sub">↑ All 6 restaurants</div>
    </div>
    <div class="kpi-card" style="border-left-color:#2f7d88">
      <div class="label">Today's Net Sales</div>
      <div class="value">${fmt(todayTotal)}</div>
      <div class="sub">Mar 25, 2026</div>
    </div>
    <div class="kpi-card" style="border-left-color:#b6904e">
      <div class="label">Weekly Expenses</div>
      <div class="value">${fmt(totalExp)}</div>
      <div class="sub" style="color:#dc3545">⚠ Sample data</div>
    </div>

window.renderAnalytics = function(el) {
  const names = window.allRestaurants.map(r => r.name);
  const sel1 = window._analyticsRest1 || names[0];
  const sel2 = window._analyticsRest2 || names[1];

  // ---- GROUP SUMMARY: Hourly heatmap across all restaurants ----
  const groupHourly = new Array(24).fill(0);
  names.forEach(name => {
    const d = window.detailData[name];
    if (d) d.hourly.forEach((v,h) => { groupHourly[h] += v; });
  });
  const peakHour = groupHourly.indexOf(Math.max(...groupHourly));
  const maxHourVal = Math.max(...groupHourly);

  // ---- GROUP TENDER TOTALS ----
  const groupTenders = {};
  names.forEach(name => {
    const d = window.detailData[name];
    if (!d) return;
    Object.entries(d.tenderTotals).forEach(([k,v]) => {
      const key = (k.includes('Credit')||k.includes('Visa')||k.includes('Mastercard')) ? 'Credit Card' 
                : (k.includes('Debit')) ? 'Debit Card'
                : (k.includes('Cash')) ? 'Cash'
                : (k.includes('Gift')) ? 'Gift Card'
                : 'Other';
      groupTenders[key] = (groupTenders[key]||0) + v;
    });
  });

  // ---- GROUP TIPS ----
  const groupTips = names.reduce((s,n) => s + (window.detailData[n] ? window.detailData[n].totalTips : 0), 0);
  const groupNet = AppState.ingresosData.reduce((s,d)=>s+d.net,0);
  const tipPct = groupNet > 0 ? (groupTips/groupNet*100).toFixed(1) : 0;

  // ---- ORDER VOLUME TABLE ----
  const orderRows = names.map(name => {
    const stats = window.orderStats[name] || {};
    const detail = window.detailData[name] || {};
    const weekNet = AppState.ingresosData.filter(d=>d.restaurant===name).reduce((s,d)=>s+d.net,0);
    const col = getColor(name);
    const tips = detail.totalTips || 0;
    const tipPctR = weekNet > 0 ? (tips/weekNet*100).toFixed(1) : 0;
    const topTender = detail.tenderTotals ? Object.entries(detail.tenderTotals).sort((a,b)=>b[1]-a[1])[0] : null;
    const topHour = detail.hourly ? detail.hourly.indexOf(Math.max(...detail.hourly)) : 0;
    return `<tr>
      <td><span style="display:inline-flex;align-items:center;gap:6px">
        <span style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>
        <strong>${name}</strong></span></td>
      <td style="text-align:right;font-weight:700">${fmt(weekNet)}</td>
      <td style="text-align:right">${stats.totalOrders ? stats.totalOrders.toLocaleString() : '—'}</td>
      <td style="text-align:right">${stats.avgTicket ? fmt(stats.avgTicket) : '—'}</td>
      <td style="text-align:right;color:#16a34a">${fmt(tips)}<span style="font-size:10px;color:#aaa;margin-left:4px">${tipPctR}%</span></td>
      <td style="text-align:right;font-size:12px;color:#555">${topTender ? topTender[0] : '—'}</td>
      <td style="text-align:center;font-size:12px">${topHour}:00–${topHour+1}:00</td>
    </tr>`;
  }).join('');

  // ---- HOURLY HEATMAP HTML ----
  const heatmapCells = Array.from({length:24},(_,h) => {
    const val = groupHourly[h];
    const pct = maxHourVal > 0 ? val/maxHourVal : 0;
    const alpha = (0.1 + pct*0.9).toFixed(2);
    const isBusinessHour = h >= 7 && h <= 22;
    if (!isBusinessHour && val === 0) return '';
    const label = h === 0 ? '12am' : h < 12 ? h+'am' : h === 12 ? '12pm' : (h-12)+'pm';
    return `<div style="text-align:center;min-width:44px">
      <div style="background:rgba(63,50,103,${alpha});border-radius:6px;height:50px;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:600;margin-bottom:4px">
        ${val > 0 ? '$'+Math.round(val/1000)+'k' : ''}
      </div>
      <div style="font-size:10px;color:#888">${label}</div>
    </div>`;
  }).filter(Boolean).join('');

  // ---- TENDER PIE DATA ----
  const tenderEntries = Object.entries(groupTenders).sort((a,b)=>b[1]-a[1]);
  const tenderTotal = tenderEntries.reduce((s,[,v])=>s+v,0);
  const tenderBars = tenderEntries.map(([k,v]) => {
    const pct = (v/tenderTotal*100).toFixed(1);
    const colors = {'Credit Card':'#3b82f6','Debit Card':'#8b5cf6','Cash':'#22c55e','Gift Card':'#f59e0b','Other':'#94a3b8'};
    const c = colors[k]||'#888';
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};margin-right:6px"></span>${k}</span>
        <span style="font-weight:600">${fmt(v)} <span style="color:#aaa;font-weight:400">${pct}%</span></span>
      </div>
      <div style="background:#f0f2f5;border-radius:4px;height:8px">
        <div style="width:${pct}%;background:${c};height:8px;border-radius:4px"></div>
      </div>
    </div>`;
  }).join('');

  // ---- CATEGORY COMPARISON across restaurants (Food vs Bar) ----
  const foodVsBar = names.map(name => {
    const tags = (window.orderStats[name]||{}).tagSales||[];
    const food = tags.find(t=>t.tag==='Food'||t.tag==='Food Sales')?? {total:0};
    const bar = tags.find(t=>t.tag==='Bar')?? {total:0};
    const liq = tags.find(t=>t.tag==='Liquor')?? {total:0};
    const barTotal = bar.total + liq.total;
    const total = food.total + barTotal;
    const foodPct = total > 0 ? Math.round(food.total/total*100) : 0;
    const barPct = total > 0 ? Math.round(barTotal/total*100) : 0;
    const col = getColor(name);
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px">
          <span style="width:10px;height:10px;border-radius:50%;background:${col};display:inline-block"></span>${name}
        </span>
        <span style="font-size:11px;color:#888">${fmt(food.total)} Food / ${fmt(barTotal)} Bar</span>
      </div>
      <div style="display:flex;height:14px;border-radius:6px;overflow:hidden">
        <div style="width:${foodPct}%;background:#16a34a;display:flex;align-items:center;justify-content:center">
          ${foodPct>15?`<span style="color:white;font-size:10px;font-weight:700">${foodPct}%</span>`:''}
        </div>
        <div style="width:${barPct}%;background:#2563eb;display:flex;align-items:center;justify-content:center">
          ${barPct>15?`<span style="color:white;font-size:10px;font-weight:700">${barPct}%</span>`:''}
        </div>
        <div style="flex:1;background:#f0f2f5"></div>
      </div>
    </div>`;
  }).join('');

  const restOptions = names.map(n=>`<option value="${n}" ${n===sel1?'selected':''}>${n}</option>`).join('');
  const restOptions2 = names.map(n=>`<option value="${n}" ${n===sel2?'selected':''}>${n}</option>`).join('');

  el.innerHTML = `
  <!-- ROW 1: KPI Summary -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px">
    <div class="kpi-card" style="border-left-color:#3f3267">
      <div class="label">Total Transactions</div>
      <div class="value">${names.reduce((s,n)=>(window.orderStats[n]?s+window.orderStats[n].totalOrders:s),0).toLocaleString()}</div>
      <div class="sub">All 7 restaurants this week</div>
    </div>
    <div class="kpi-card" style="border-left-color:#16a34a">
      <div class="label">Total Tips Collected</div>
      <div class="value">${fmt(groupTips)}</div>
      <div class="sub">${tipPct}% of net sales</div>
    </div>
    <div class="kpi-card" style="border-left-color:#2563eb">
      <div class="label">Top Payment Method</div>
      <div class="value" style="font-size:18px">${Object.entries(groupTenders).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—'}</div>
      <div class="sub">${fmt(Object.entries(groupTenders).sort((a,b)=>b[1]-a[1])[0]?.[1]||0)} this week</div>
    </div>
    <div class="kpi-card" style="border-left-color:#f59e0b">
      <div class="label">Peak Hour (Group)</div>
      <div class="value">${peakHour}:00–${peakHour+1}:00</div>
      <div class="sub">${fmt(maxHourVal)} during peak hour</div>
    </div>
  </div>

  <!-- ROW 2: Order Table -->
  <div class="card" style="margin-bottom:20px">
    <h3>📊 Full Performance Summary — This Week</h3>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Restaurant</th><th style="text-align:right">Net Sales</th><th style="text-align:right">Transactions</th><th style="text-align:right">Avg Ticket</th><th style="text-align:right">Tips</th><th style="text-align:right">Top Payment</th><th style="text-align:center">Peak Hour</th></tr></thead>
        <tbody>${orderRows}</tbody>
        <tfoot><tr style="background:#f8f9fa;font-weight:700">
          <td>GROUP TOTAL</td>
          <td style="text-align:right">${fmt(groupNet)}</td>
          <td style="text-align:right">${names.reduce((s,n)=>(window.orderStats[n]?s+window.orderStats[n].totalOrders:s),0).toLocaleString()}</td>
          <td style="text-align:right">${fmt(groupNet/names.reduce((s,n)=>(window.orderStats[n]?s+window.orderStats[n].totalOrders:s),1))}</td>
          <td style="text-align:right;color:#16a34a">${fmt(groupTips)}</td>
          <td colspan="2"></td>
        </tr></tfoot>
      </table>
    </div>
  </div>

  <!-- ROW 3: Heatmap + Tender + Food/Bar -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
    <div class="card">
      <h3>🔥 Food vs. Bar — All Restaurants</h3>
      <div style="font-size:11px;color:#888;margin-bottom:12px;display:flex;gap:16px">
        <span><span style="background:#16a34a;width:12px;height:12px;border-radius:2px;display:inline-block;margin-right:4px"></span>Food</span>
        <span><span style="background:#2563eb;width:12px;height:12px;border-radius:2px;display:inline-block;margin-right:4px"></span>Bar/Liquor</span>
      </div>
      ${foodVsBar}
    </div>
    <div class="card">
      <h3>💳 Payment Methods — Group Total</h3>
      ${tenderBars}
      <div class="chart-container" style="height:180px;margin-top:12px"><canvas id="chartTenderGroup"></canvas></div>
    </div>
  </div>

  <!-- ROW 4: Hourly Heatmap -->
  <div class="card" style="margin-bottom:20px">
    <h3>⏰ Sales by Hour — Group Total (All 7 Restaurants)</h3>
    <div style="display:flex;gap:8px;overflow-x:auto;padding:8px 0">${heatmapCells}</div>
    <div class="chart-container" style="height:200px;margin-top:16px"><canvas id="chartHourly"></canvas></div>
  </div>

  <!-- ROW 5: Detailed Analytics (per restaurant comparison) -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <div class="section-title" style="margin:0">🔬 Deep Dive — Restaurant Comparison</div>
    <select onchange="window._analyticsRest1=this.value;renderTab()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px">${restOptions}</select>
    <span style="color:#888">vs.</span>
    <select onchange="window._analyticsRest2=this.value;renderTab()" style="padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px">${restOptions2}</select>
  </div>
  <div class="grid-2" id="deepDivePanels"></div>`;

  setTimeout(() => {
    // Tender donut
    const ctx1 = document.getElementById('chartTenderGroup');
    if (ctx1) {
      const tColors = {'Credit Card':'#3b82f6','Debit Card':'#8b5cf6','Cash':'#22c55e','Gift Card':'#f59e0b','Other':'#94a3b8'};
      new Chart(ctx1, {
        type: 'doughnut',
        data: {
          labels: tenderEntries.map(([k])=>k),
          datasets: [{ data: tenderEntries.map(([,v])=>v), backgroundColor: tenderEntries.map(([k])=>tColors[k]||'#888'), borderWidth: 2 }]
        },
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ boxWidth:12, font:{size:11} } } } }
      });
    }

    // Hourly bar chart
    const ctx2 = document.getElementById('chartHourly');
    if (ctx2) {
      const businessHours = Array.from({length:16},(_,i)=>i+7); // 7am to 10pm
      new Chart(ctx2, {
        type: 'bar',
        data: {
          labels: businessHours.map(h => h<12?h+'am':h===12?'12pm':(h-12)+'pm'),
          datasets: names.map(name => {
            const d = window.detailData[name];
            return {
              label: name,
              data: businessHours.map(h => d ? Math.round(d.hourly[h]) : 0),
              backgroundColor: getColor(name)+'cc',
              borderColor: getColor(name),
              borderWidth: 1,
              borderRadius: 3
            };
          })
        },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10} } } },
          scales:{ x:{stacked:true}, y:{ stacked:true, ticks:{ callback: v=>'$'+v.toLocaleString() } } }
        }
      });
    }

    // Build deep dive panels
    buildDeepDivePanels(sel1, sel2);
  }, 100);
};

window.renderComparativo = function() {

window.syncClover = function() {
  var btn = event.target;
  btn.textContent = '⏳ Sincronizando...';
  btn.disabled = true;
  var configured = AppState.restaurants.filter(r => r.token && r.merchantId);
  if(configured.length === 0) {
    alert('⚠️ Primero configura al menos un restaurante con su API Token y Merchant ID en la pestaña Configuración.');
    btn.textContent = '🔄 Sincronizar Clover';
    btn.disabled = false;
    return;
  }
  setTimeout(function() {
    document.getElementById('last-sync').textContent = 'Última sync: ' + new Date().toLocaleTimeString();
    btn.textContent = '🔄 Sincronizar Clover';
    btn.disabled = false;
    alert('✅ Datos sincronizados correctamente desde Clover.');
  }, 2000);
};

window.showTab = function(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
  if(tab==='dashboard') renderDashboard();
  if(tab==='ingresos') renderIngresos();
  if(tab==='gastos') renderGastos();
  if(tab==='comparativo') renderComparativo();
  if(tab==='config') renderConfig();
};

window.switchTab = function(tab) {
  window.activeTab = tab;
  renderApp();
};

window.renderTab = function() {
  const el = document.getElementById('main-content');
  if (!el) return;
  if (activeTab === 'dashboard') renderDashboard(el);
  else if (activeTab === 'income') renderIncome(el);
  else if (activeTab === 'analytics') renderAnalytics(el);
  else if (activeTab === 'expenses') renderExpenses(el);
  else if (activeTab === 'comparison') renderComparison(el);
  else if (activeTab === 'breakdown') renderBreakdown(el);
  else if (activeTab === 'settings') renderSettings(el);
};

        <tfoot><tr style="background:#f8f9fa;font-weight:700">
          <td colspan="2">TOTAL</td>
          <td style="text-align:right">${fmt(AppState.ingresosData.reduce((s,r)=>s+(r.gross||0),0))}</td>
          <td style="text-align:right;color:#dc3545">-${fmt(AppState.ingresosData.reduce((s,r)=>s+(r.discounts||0),0))}</td>
          <td style="text-align:right">${fmt(AppState.ingresosData.reduce((s,r)=>s+(r.tax||0),0))}</td>
          <td style="text-align:right">${fmt(AppState.ingresosData.reduce((s,r)=>s+(r.tips||0),0))}</td>
          <td style="text-align:right">${fmt(AppState.ingresosData.reduce((s,r)=>s+r.net,0))}</td>

            label: name,

              const r = AppState.ingresosData.find(x=>x.date===d && x.restaurant===name);

window.filterIncomeTable = function() {
  const rest = document.getElementById('filterRest').value;
  const date = document.getElementById('filterDate').value;
  const filtered = AppState.ingresosData.filter(r => 
    (!rest || r.restaurant === rest) && (!date || r.date === date)
  ).sort((a,b) => a.date < b.date ? 1 : -1);

  const tbody = document.getElementById('incomeBody');
  if (tbody) {
    tbody.innerHTML = filtered.map(r => {
      const dt = new Date(r.date+'T12:00:00');
      const dateStr = dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const col = getColor(r.restaurant);
      return `<tr>
        <td>${dateStr}</td>
        <td><span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block"></span>${r.restaurant}</span></td>
        <td style="text-align:right">${fmt(r.gross||0)}</td>
        <td style="text-align:right;color:#dc3545">${r.discounts>0?'-'+fmt(r.discounts):'$0.00'}</td>
        <td style="text-align:right">${fmt(r.tax||0)}</td>
        <td style="text-align:right">${fmt(r.tips||0)}</td>
        <td style="text-align:right;font-weight:700">${fmt(r.net)}</td>
      </tr>`;
    }).join('');
  }
};

window.renderExpenses = function(el) {
  const names = getRestaurantNames();
  const vendors = ['US Foods', 'Webstaurant Store', 'Amazon', 'Other'];
  const activeVendorTab = window._expVendorTab || 'all';
  const activeStatusFilter = window._expStatusFilter || 'all';
  const activeRestFilter = window._expRestFilter || '';
  const activeVendorFilter = window._expVendorFilter || '';

  // Filtered expenses
  let filtered = AppState.expenses.filter(e => {
    if (activeStatusFilter !== 'all' && e.status !== activeStatusFilter) return false;
    if (activeRestFilter && e.restaurant !== activeRestFilter) return false;
    if (activeVendorFilter && e.vendor !== activeVendorFilter) return false;
    if (activeVendorTab !== 'all' && e.vendor !== activeVendorTab) return false;
    return true;
  }).sort((a,b) => b.date > a.date ? 1 : -1);

  // Stats per vendor
  const vendorStats = {};
  vendors.forEach(v => {
    const vExp = AppState.expenses.filter(e => e.vendor === v);
    vendorStats[v] = {
      total: vExp.reduce((s,e)=>s+e.amount,0),
      count: vExp.length,
      paid: vExp.filter(e=>e.status==='Paid').reduce((s,e)=>s+e.amount,0),
      pending: vExp.filter(e=>e.status==='Pending').reduce((s,e)=>s+e.amount,0)
    };
  });
  const otherExp = AppState.expenses.filter(e => !['US Foods','Webstaurant Store','Amazon'].includes(e.vendor));
  vendorStats['Other'] = {
    total: otherExp.reduce((s,e)=>s+e.amount,0),
    count: otherExp.length,
    paid: otherExp.filter(e=>e.status==='Paid').reduce((s,e)=>s+e.amount,0),
    pending: otherExp.filter(e=>e.status==='Pending').reduce((s,e)=>s+e.amount,0)
  };

  const totalAll = AppState.expenses.reduce((s,e)=>s+e.amount,0);
  const totalPaid = AppState.expenses.filter(e=>e.status==='Paid').reduce((s,e)=>s+e.amount,0);
  const totalPending = AppState.expenses.filter(e=>e.status==='Pending').reduce((s,e)=>s+e.amount,0);

  // Per restaurant expense totals
  const restExpTotals = {};
  names.forEach(n => {
    restExpTotals[n] = AppState.expenses.filter(e=>e.restaurant===n).reduce((s,e)=>s+e.amount,0);
  });

  // Vendor tab buttons
  const vendorTabs = ['all', 'US Foods', 'Webstaurant Store', 'Amazon', 'Other'].map(v => {
    const cfg = window.vendorConfig[v] || {color:'#3f3267', icon:'📋'};
    const isActive = activeVendorTab === v;
    const cnt = v === 'all' ? AppState.expenses.length : (v === 'Other' ? otherExp.length : AppState.expenses.filter(e=>e.vendor===v).length);
    return `<div onclick="window._expVendorTab='${v}';renderTab()" style="

      background:${isActive?cfg.color:'white'};

      ${v==='all'?'📋':cfg.icon} ${v==='all'?'All Expenses':v}

        padding:2px 8px;border-radius:10px;font-size:11px">${cnt}</span>

window.fetchPaymentsForRestaurant = async function(name, token, mid) {
  const dates = ['2026-03-20','2026-03-21','2026-03-22','2026-03-23','2026-03-24','2026-03-25'];
  // Remove existing data for this restaurant
  AppState.ingresosData = AppState.ingresosData.filter(d=>d.restaurant !== name);

  for (const date of dates) {
    const start = new Date(date+'T00:00:00-08:00').getTime();
    const end = new Date(date+'T23:59:59-08:00').getTime();
    let offset = 0; let totalAmt = 0; let totalTax = 0; let totalTips = 0; let hasData = false;
    while (true) {
      const url = `https://api.clover.com/v3/merchants/${mid}/payments?filter=result%3DSUCCESS&filter=createdTime%3E${start}&filter=createdTime%3C${end}&limit=200&offset=${offset}&expand=order`;
      const resp = await fetch(url, { headers: { Authorization: 'Bearer '+token } });
      if (!resp.ok) break;
      const data = await resp.json();
      const pmts = data.elements || [];
      if (pmts.length === 0) break;
      pmts.forEach(p => {
        totalAmt += (p.amount||0);
        totalTax += (p.taxAmount||0);
        totalTips += (p.tipAmount||0);
        hasData = true;
      });
      offset += pmts.length;
      if (pmts.length < 200) break;
    }
    if (hasData) {
      const gross = totalAmt / 100;
      const tax = totalTax / 100;
      const tips = totalTips / 100;
      const net = (totalAmt - totalTax) / 100;
      AppState.ingresosData.push({ date, restaurant: name, gross, discounts: 0, tax, tips, net });
    }
  }

  const saved = JSON.parse(localStorage.getItem('dashboardData')||'{}');
  saved.ingresosData = AppState.ingresosData;
  localStorage.setItem('dashboardData', JSON.stringify(saved));
  renderApp();
};

window.fetchOrderSalesDataV2 = async function fetchOrderSalesDataV2(rest) {
  const { name, token, mid } = rest;
  const dates = ['2026-03-20','2026-03-21','2026-03-22','2026-03-23','2026-03-24','2026-03-25'];
  const itemMap = (window._itemMap && window._itemMap[name]) || {};
  
  const catSales = {};
  const tagSales = {};
  const itemSales = {};
  let totalOrders = 0;
  let totalRevenue = 0;

  for (const date of dates) {
    const start = new Date(date+'T00:00:00-08:00').getTime();
    const end = new Date(date+'T23:59:59-08:00').getTime();
    let offset = 0;
    
    while (true) {
      // Use state=locked (closed orders) instead of paymentState
      const url = `https://api.clover.com/v3/merchants/${mid}/orders?filter=createdTime%3E${start}&filter=createdTime%3C${end}&filter=state%3Dlocked&limit=100&offset=${offset}&expand=lineItems`;
      const resp = await fetch(url, { headers: { Authorization: 'Bearer '+token } });
      if (!resp.ok) break;
      const data = await resp.json();
      const orders = data.elements || [];
      if (orders.length === 0) break;
      
      orders.forEach(order => {
        totalOrders++;
        const lineItems = (order.lineItems && order.lineItems.elements) || [];
        lineItems.forEach(li => {
          if (li.refunded || li.exchanged || !li.isRevenue) return;
          const price = li.price || 0;
          totalRevenue += price;
          
          const itemId = li.item ? li.item.id : null;
          const itemInfo = itemId ? itemMap[itemId] : null;
          
          if (itemInfo && itemInfo.categories.length > 0) {
            itemInfo.categories.forEach(cat => {
              catSales[cat] = (catSales[cat] || 0) + price;
            });
          } else {
            catSales['Other'] = (catSales['Other'] || 0) + price;
          }
          
          if (itemInfo && itemInfo.tags.length > 0) {
            itemInfo.tags.forEach(tag => {
              if (!tag.startsWith('GL') && !tag.startsWith('Kitchen') && 
                  !tag.startsWith('Expo') && tag !== 'Bar #1' && tag !== 'Bar #2' && 
                  tag !== 'Bar #3' && !tag.startsWith('Server')) {
                tagSales[tag] = (tagSales[tag] || 0) + price;
              }
            });
          }
          
          const itemName = li.name || 'Unknown';
          if (!itemSales[itemName]) itemSales[itemName] = { total: 0, count: 0 };
          itemSales[itemName].total += price;
          itemSales[itemName].count++;
        });
      });
      
      offset += orders.length;
      if (orders.length < 100) break;
    }
  }
  
  const topItemsList = Object.entries(itemSales)
    .map(([n, d]) => ({ name: n, total: d.total/100, count: d.count }))
    .sort((a,b) => b.total - a.total).slice(0, 15);
  
  const catList = Object.entries(catSales)
    .map(([cat, total]) => ({ cat, total: total/100 }))
    .sort((a,b) => b.total - a.total);
  
  const tagList = Object.entries(tagSales)
    .map(([tag, total]) => ({ tag, total: total/100 }))
    .sort((a,b) => b.total - a.total);

  window.categoryData[name] = catList;
  window.topItems[name] = topItemsList;
  window.orderStats[name] = { totalOrders, avgTicket: totalOrders > 0 ? (totalRevenue/100/totalOrders) : 0, tagSales: tagList };
  
  return { catList, topItemsList, totalOrders, totalRevenue: totalRevenue/100 };
};

window.fetchBasicStatsFromPayments = async function(rest) {
  const { name, token, mid } = rest;
  const dates = ['2026-03-20','2026-03-21','2026-03-22','2026-03-23','2026-03-24','2026-03-25'];
  let totalPayments = 0;
  let totalAmount = 0;
  
  for (const date of dates) {
    const start = new Date(date+'T00:00:00-08:00').getTime();
    const end = new Date(date+'T23:59:59-08:00').getTime();
    let offset = 0;
    while (true) {
      const url = `https://api.clover.com/v3/merchants/${mid}/payments?filter=result%3DSUCCESS&filter=createdTime%3E${start}&filter=createdTime%3C${end}&limit=200&offset=${offset}`;
      const resp = await fetch(url, { headers: { Authorization: 'Bearer '+token } });
      if (!resp.ok) break;
      const data = await resp.json();
      const pmts = data.elements || [];
      if (pmts.length === 0) break;
      pmts.forEach(p => { totalPayments++; totalAmount += (p.amount||0); });
      offset += pmts.length;
      if (pmts.length < 200) break;
    }
  }
  
  window.orderStats[name] = {
    totalOrders: totalPayments,
    avgTicket: totalPayments > 0 ? (totalAmount/100/totalPayments) : 0,
    tagSales: [],
    paymentsBased: true
  };
  window.categoryData[name] = [];
  window.topItems[name] = [];
  return totalPayments;
};

window.renderBreakdown = function(el) {
  const names = getRestaurantNames();

  const cards = names.map(name => {

    const totGross = records.reduce((s,r)=>s+(r.gross||0),0);
    const totDisc = records.reduce((s,r)=>s+(r.discounts||0),0);
    const totNet = records.reduce((s,r)=>s+r.net,0);
    const totTax = records.reduce((s,r)=>s+(r.tax||0),0);
    const totTips = records.reduce((s,r)=>s+(r.tips||0),0);

    const dateRows = records.map(r => {

    return `<div class="breakdown-card">
      <div class="bc-header" style="color:${col};border-bottom-color:${col}">

      <div class="bc-row"><span style="color:#888">Discounts</span><span class="neg">${totDisc>0?'-'+fmt(totDisc):'$0.00'}</span></div>

      ${dateRows}
    </div>`;
  }).join('');

  el.innerHTML = `
  <div style="margin-bottom:16px">
    <div class="section-title">🔍 Detailed Breakdown by Restaurant</div>
    <p style="color:#888;font-size:13px">Mar 20–25, 2026 · Net Sales = Gross - Discounts · Source: Clover API</p>
  </div>
  <div class="breakdown-grid">${cards}</div>`;
};
